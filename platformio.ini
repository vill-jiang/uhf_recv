[env:STC8H1K17]
platform = intel_mcs51
board = STC8H1K17
board_build.f_cpu = 35000000L
upload_speed = 115200
monitor_speed = 115200
build_flags = 
	--no-xinit-opt
	--opt-code-size
	--model-small
	-Wl
	-m

